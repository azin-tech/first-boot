name: Cleanup fork on PR close

# Destroys the boxd fork VM that the fix-on-issue action kept alive.
# Runs on any PR close — merged or abandoned — so we don't leak forks.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    if: startsWith(github.event.pull_request.head.ref, 'claude-fix/issue-')
    runs-on: ubuntu-latest
    steps:
      - name: Delete the PR branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${HEAD_REF}" || true
      - name: Install grpcurl
        run: |
          curl -fsSL -o /tmp/grpcurl.tar.gz \
            https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz
          tar -xzf /tmp/grpcurl.tar.gz -C /tmp grpcurl
          sudo mv /tmp/grpcurl /usr/local/bin/grpcurl

      - name: Exchange API key for JWT
        env:
          BOXD_API_KEY: ${{ secrets.BOXD_API_KEY }}
        run: |
          set -euo pipefail
          jwt=$(curl -fsSL -X POST "https://boxd-stg.sh/api/v1/auth/token" \
            -H 'Content-Type: application/json' \
            -d "{\"api_key\":\"$BOXD_API_KEY\"}" | jq -r .token)
          [[ -n "$jwt" && "$jwt" != "null" ]] || { echo "key exchange failed"; exit 1; }
          echo "::add-mask::$jwt"
          echo "BOXD_JWT=$jwt" >> "$GITHUB_ENV"

      - name: Destroy fork
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          issue_num="${HEAD_REF#claude-fix/issue-}"
          vm_name="claude-fix-issue-${issue_num}"
          echo "looking up ${vm_name}..."
          vm_id=$(grpcurl -plaintext -max-time 30 \
            -H "authorization: Bearer $BOXD_JWT" \
            -d '{}' \
            boxd-stg.sh:9443 boxd.api.v1.BoxdApi/ListVms \
            | jq -r --arg n "$vm_name" '.vms[] | select(.name==$n) | .vmId')
          if [[ -z "$vm_id" ]]; then
            echo "VM ${vm_name} not found — already gone"
            exit 0
          fi
          msg=$(jq -nc --arg id "$vm_id" '{vm_id:$id}')
          grpcurl -plaintext -max-time 30 \
            -H "authorization: Bearer $BOXD_JWT" \
            -d "$msg" \
            boxd-stg.sh:9443 boxd.api.v1.BoxdApi/DestroyVm
          echo "destroyed ${vm_name}"
