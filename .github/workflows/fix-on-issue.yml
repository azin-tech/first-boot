name: Fix issue with Claude

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: string

jobs:
  fix:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/fix-on-issue
        with:
          boxd-api-key: ${{ secrets.BOXD_API_KEY }}
          boxd-api-url: https://boxd-stg.sh
          golden-vm: red-rock
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
