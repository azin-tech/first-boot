name: 'boxd — fix issue with Claude'
description: 'Fork a boxd golden VM, run Claude Code to fix a labeled GitHub issue, and open a PR.'
author: 'boxd'

inputs:
  boxd-api-key:
    description: 'boxd API key (bxd_...). Exchanged for a JWT at runtime.'
    required: true
  boxd-api-url:
    description: 'boxd API base URL (used for /api/v1/auth/token exchange + gRPC host).'
    required: false
    default: 'https://boxd.sh'
  golden-vm:
    description: 'Name of the pre-provisioned golden VM to fork per run'
    required: false
    default: 'red-rock'
  anthropic-api-key:
    description: 'Anthropic API key for Claude Code (passed into the VM)'
    required: true
  github-token:
    description: 'GitHub token with contents:write + pull-requests:write'
    required: true
    default: ${{ github.token }}
  label:
    description: 'Only run if this label is present on the issue'
    required: false
    default: 'claude-fix'
  vm-timeout-secs:
    description: 'Per-exec timeout in seconds'
    required: false
    default: '1800'
  max-turns:
    description: 'Max Claude agent turns'
    required: false
    default: '40'

outputs:
  pr-url:
    description: 'URL of the PR opened by Claude'
    value: ${{ steps.open-pr.outputs.pr-url }}
  vm-name:
    description: 'Name of the ephemeral fork'
    value: ${{ steps.create-vm.outputs.vm-name }}

runs:
  using: 'composite'
  steps:
    - name: Guard — label present
      id: guard
      shell: bash
      run: |
        set -euo pipefail
        labels='${{ toJSON(github.event.issue.labels) }}'
        target='${{ inputs.label }}'
        if ! echo "$labels" | jq -e --arg t "$target" '.[] | select(.name == $t)' >/dev/null; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install grpcurl
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL -o /tmp/grpcurl.tar.gz \
          https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz
        tar -xzf /tmp/grpcurl.tar.gz -C /tmp grpcurl
        sudo mv /tmp/grpcurl /usr/local/bin/grpcurl
        grpcurl -version

    - name: Exchange API key for JWT
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        BOXD_API_KEY: ${{ inputs.boxd-api-key }}
        BOXD_API_URL: ${{ inputs.boxd-api-url }}
      run: |
        set -euo pipefail
        jwt=$(curl -fsSL -X POST "${BOXD_API_URL}/api/v1/auth/token" \
          -H 'Content-Type: application/json' \
          -d "{\"api_key\":\"$BOXD_API_KEY\"}" | jq -r .token)
        [[ -n "$jwt" && "$jwt" != "null" ]] || { echo "key exchange failed"; exit 1; }
        echo "::add-mask::$jwt"
        echo "BOXD_JWT=$jwt" >> "$GITHUB_ENV"
        host="${BOXD_API_URL#https://}"; host="${host#http://}"
        echo "BOXD_GRPC_HOST=${host}:9443" >> "$GITHUB_ENV"

    - name: Fork golden, sync repo, run Claude
      if: steps.guard.outputs.skip != 'true'
      id: create-vm
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GOLDEN_VM: ${{ inputs.golden-vm }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
        ISSUE_BODY: ${{ github.event.issue.body }}
        VM_TIMEOUT_SECS: ${{ inputs.vm-timeout-secs }}
        MAX_TURNS: ${{ inputs.max-turns }}
        ACTION_PATH: ${{ github.action_path }}
      run: ${{ github.action_path }}/scripts/run-claude.sh

    - name: Apply patch and open PR
      if: steps.guard.outputs.skip != 'true' && steps.create-vm.outputs.has-patch == 'true'
      id: open-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
        PATCH_FILE: ${{ steps.create-vm.outputs.patch-file }}
        BRANCH_NAME: claude-fix/issue-${{ github.event.issue.number }}
        PREVIEW_URL: ${{ steps.create-vm.outputs.preview-url }}
      run: |
        set -euo pipefail
        git config user.name "boxd-bot"
        git config user.email "boxd-bot@users.noreply.github.com"
        git checkout -b "$BRANCH_NAME"
        git am "$PATCH_FILE"
        git push --force-with-lease origin "$BRANCH_NAME"

        # If Claude saved before/after screenshots on this branch, embed them.
        shots=""
        raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${BRANCH_NAME}"
        if git cat-file -e "${BRANCH_NAME}:.claude-screenshots/before.png" 2>/dev/null \
          && git cat-file -e "${BRANCH_NAME}:.claude-screenshots/after.png" 2>/dev/null; then
          shots=$(printf '\n### Visual diff\n\n| Before | After |\n|:---:|:---:|\n| ![before](%s/.claude-screenshots/before.png) | ![after](%s/.claude-screenshots/after.png) |\n' "$raw_base" "$raw_base")
        elif git cat-file -e "${BRANCH_NAME}:.claude-screenshots/after.png" 2>/dev/null; then
          shots=$(printf '\n### Screenshot\n\n![after](%s/.claude-screenshots/after.png)\n' "$raw_base")
        fi
        body="Closes #$ISSUE_NUMBER. Authored by Claude Code in a boxd VM."
        if [[ -n "${PREVIEW_URL:-}" ]]; then
          body="${body}"$'\n\n'"**Live preview** (boxd fork): ${PREVIEW_URL}"
        fi
        [[ -n "$shots" ]] && body="${body}"$'\n'"${shots}"

        pr_url=$(gh pr create \
          --title "Claude: fix #$ISSUE_NUMBER — $ISSUE_TITLE" \
          --body "$body" \
          --head "$BRANCH_NAME")
        echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"

    # Only destroy here on failure or when Claude produced no patch.
    # On success-with-PR, leave the fork alive so reviewers can poke at it.
    # The cleanup-on-merge workflow destroys it when the PR lands.
    - name: Destroy fork (on failure or no-patch)
      if: steps.create-vm.outputs.fork-id != '' && (failure() || steps.create-vm.outputs.has-patch != 'true')
      shell: bash
      run: |
        set -eu
        msg=$(jq -nc --arg id "${{ steps.create-vm.outputs.fork-id }}" '{vm_id:$id}')
        grpcurl -plaintext -max-time 30 \
          -H "authorization: Bearer $BOXD_JWT" \
          -d "$msg" \
          "$BOXD_GRPC_HOST" boxd.api.v1.BoxdApi/DestroyVm || true
