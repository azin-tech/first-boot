<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{VM_NAME}} — Snake</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='32' height='32'%3E%3Cg transform='translate(2,2)'%3E%3Cpath d='M 2 0 L 26 0 A 2 2 0 0 1 28 2 L 28 26 A 2 2 0 0 1 26 28 L 7.6 28 A 2 2 0 0 1 5.6 26 L 5.6 24.4 A 2 2 0 0 0 3.6 22.4 L 2 22.4 A 2 2 0 0 1 0 20.4 L 0 2 A 2 2 0 0 1 2 0 Z' fill='%23f4f4f5'/%3E%3C/g%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #0a0c12;
    background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size: 20px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #f4f4f5;
    overflow: hidden;
    overflow-y: auto;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #f4f4f5;
  }
  .hud {
    display: flex;
    gap: 40px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a1a1aa;
  }
  .hud span { color: #E05A6D; font-weight: 600; }
  .canvas-wrap {
    position: relative;
    width: 480px;
    max-width: calc(100vw - 32px);
    aspect-ratio: 1;
  }
  canvas {
    width: 100%;
    height: 100%;
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 8px;
    box-shadow:
      0 0 60px rgba(224, 90, 109, 0.06),
      0 0 120px rgba(224, 90, 109, 0.03);
  }
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    background: transparent;
    border-radius: 8px;
    transition: background 0.3s;
  }
  .overlay.active {
    background: rgba(10, 12, 18, 0.7);
    pointer-events: auto;
  }
  .overlay .msg {
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f4f4f5;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .overlay.active .msg { opacity: 1; }
  .overlay .sub {
    font-size: 13px;
    color: #a1a1aa;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.3s 0.1s;
  }
  .overlay.active .sub { opacity: 1; }
  .controls {
    font-size: 11px;
    color: #2a2d36;
    letter-spacing: 1px;
  }
  .mobile-controls {
    display: none;
    gap: 6px;
    justify-content: center;
    align-items: center;
    padding-top: 8px;
    touch-action: manipulation;
  }
  .mobile-controls button {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: #a1a1aa;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }
  .mobile-controls button:active {
    background: rgba(224, 90, 109, 0.2);
    border-color: rgba(224, 90, 109, 0.4);
    color: #E05A6D;
  }
  .dpad { display: grid; grid-template: auto auto auto / auto auto auto; gap: 4px; }
  .dpad button { width: 50px; height: 50px; }
  @media (pointer: coarse), (max-width: 520px) {
    .mobile-controls { display: flex; }
    .controls { display: none; }
    h1 { font-size: 22px; letter-spacing: 3px; }
    .hud { font-size: 12px; gap: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">{{VM_NAME}}</h1>
  <div class="hud">
    Score <span id="score">0</span>
    &nbsp;&middot;&nbsp;
    Best <span id="best">0</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="480" height="480"></canvas>
    <div class="overlay active" id="overlay">
      <div class="msg" id="msg">Tap to Start</div>
      <div class="sub" id="sub">Swipe or use buttons to move</div>
    </div>
  </div>
  <div class="controls">SPACE to pause &middot; Arrow keys / WASD to move</div>
  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <div></div>
      <button id="btnUp" aria-label="Up">&#9650;</button>
      <div></div>
      <button id="btnLeft" aria-label="Left">&#9664;</button>
      <div></div>
      <button id="btnRight" aria-label="Right">&#9654;</button>
      <div></div>
      <button id="btnDown" aria-label="Down">&#9660;</button>
      <div></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CELL = 20;
const COLS = W / CELL, ROWS = H / CELL;

let snake, dir, nextDir, food, score, best = 0, state, particles, timer;
const FPS = 10;

function init() {
  const mid = Math.floor(ROWS / 2);
  snake = [{x: 5, y: mid}, {x: 4, y: mid}, {x: 3, y: mid}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  particles = [];
  document.getElementById('score').textContent = '0';
  placeFood();
}

function placeFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (occupied.has(pos.x + ',' + pos.y));
  food = pos;
}

function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: x * CELL + CELL / 2,
      y: y * CELL + CELL / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: Math.random() > 0.5 ? '#E05A6D' : '#E8798A',
      size: 2 + Math.random() * 3
    });
  }
}

function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
  // Self collision
  for (const s of snake) if (s.x === head.x && s.y === head.y) return die();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = score;
    spawnParticles(food.x, food.y);
    placeFood();
  } else {
    snake.pop();
  }
}

function die() {
  state = 'dead';
  if (score > best) {
    best = score;
    document.getElementById('best').textContent = best;
  }
  // Death particles along the whole snake
  for (const s of snake) spawnParticles(s.x, s.y);
  const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  showOverlay('Game Over', isMobile ? 'Tap to Restart' : 'Press Space to Restart');
}

function showOverlay(msg, sub) {
  document.getElementById('msg').textContent = msg;
  document.getElementById('sub').textContent = sub;
  document.getElementById('overlay').classList.add('active');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawSnake() {
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const t = i / snake.length;
    const r = CELL - 2;

    // Gradient from head to tail
    const g = ctx.createRadialGradient(
      s.x * CELL + CELL/2, s.y * CELL + CELL/2, 0,
      s.x * CELL + CELL/2, s.y * CELL + CELL/2, r
    );

    if (i === 0) {
      // Head: bright green
      g.addColorStop(0, '#4ade80');
      g.addColorStop(1, '#22c55e');
      // Glow
      ctx.shadowColor = 'rgba(34, 197, 94, 0.6)';
      ctx.shadowBlur = 15;
    } else {
      // Body: fading green
      const alpha = 0.85 - t * 0.45;
      g.addColorStop(0, `rgba(34, 197, 94, ${alpha})`);
      g.addColorStop(1, `rgba(21, 128, 61, ${alpha})`);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, r, r, 4);
    ctx.fill();
  }
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawFood() {
  const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
  const r = CELL - 2;
  const inset = (1 - pulse) * r * 0.15;

  // Glow — warm rose accent
  ctx.shadowColor = 'rgba(224, 90, 109, 0.6)';
  ctx.shadowBlur = 20;

  ctx.fillStyle = '#E05A6D';
  ctx.beginPath();
  ctx.roundRect(food.x * CELL + 1 + inset, food.y * CELL + 1 + inset, r - inset * 2, r - inset * 2, 4);
  ctx.fill();

  // Inner bright core
  const coreInset = r * 0.25;
  ctx.fillStyle = 'rgba(232, 121, 138, 0.6)';
  ctx.beginPath();
  ctx.roundRect(food.x * CELL + 1 + coreInset, food.y * CELL + 1 + coreInset, r - coreInset * 2, r - coreInset * 2, 3);
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= 0.025;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function render() {
  ctx.clearRect(0, 0, W, H);

  // Background — BOXD dark navy
  ctx.fillStyle = '#0a0c12';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  if (state === 'play' || state === 'paused' || state === 'dead') {
    drawSnake();
    drawFood();
  }
  drawParticles();

  requestAnimationFrame(render);
}

function gameLoop() {
  if (state !== 'play') return;
  update();
  timer = setTimeout(gameLoop, 1000 / FPS);
}

function startGame() {
  init();
  state = 'play';
  hideOverlay();
  gameLoop();
}

// Input
document.addEventListener('keydown', e => {
  const key = e.key;

  if (key === ' ' || key === 'Spacebar') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') return startGame();
    if (state === 'play') {
      state = 'paused';
      const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      showOverlay('Paused', isMobile ? 'Tap to Resume' : 'Press Space to Resume');
      return;
    }
    if (state === 'paused') {
      state = 'play';
      hideOverlay();
      gameLoop();
      return;
    }
  }

  // Direction
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
    W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0},
  };
  if (map[key]) {
    e.preventDefault();
    const nd = map[key];
    // Prevent reversing
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }
});

// Touch controls — listen on the whole game area so overlay doesn't block
const gameArea = canvas.parentElement;
let touchStart = null;
gameArea.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  e.preventDefault();
}, {passive: false});
gameArea.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
    // Tap — start/pause/resume
    if (state === 'idle' || state === 'dead') return startGame();
    if (state === 'play') { state = 'paused'; showOverlay('Paused', 'Tap to Resume'); return; }
    if (state === 'paused') { state = 'play'; hideOverlay(); gameLoop(); return; }
    return;
  }
  let nd;
  if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  e.preventDefault();
}, {passive: false});

// Overlay click for desktop mouse clicks too
document.getElementById('overlay').addEventListener('click', () => {
  if (state === 'idle' || state === 'dead') return startGame();
  if (state === 'paused') { state = 'play'; hideOverlay(); gameLoop(); }
});

// D-pad buttons
function bindDpad(id, nd) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    if (state === 'idle' || state === 'dead') startGame();
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }, {passive: false});
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (state === 'idle' || state === 'dead') startGame();
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  });
}
bindDpad('btnUp', {x:0,y:-1});
bindDpad('btnDown', {x:0,y:1});
bindDpad('btnLeft', {x:-1,y:0});
bindDpad('btnRight', {x:1,y:0});

// Detect touch device and set appropriate text
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (!isTouchDevice) {
  document.getElementById('msg').textContent = 'Press Space to Start';
  document.getElementById('sub').textContent = 'Arrow keys or WASD to move';
}

// Init
state = 'idle';
init();
render();
</script>
</body>
</html>
